<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בחירות מקדימות - מועמדים</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>המועמדים לבחירות המקדימות</h1>

    <input
        type="text"
        id="searchBox"
        placeholder="חפש מועמד..."
    >
</header>

<main>
    <div id="candidateGrid" class="candidate-grid"></div>
</main>

<!-- Modal -->

<div id="candidateModal" class="modal hidden">

    <div class="modal-content">

        <button id="closeModal" class="close-btn">
            ✕
        </button>

        <h2 id="modalName"></h2>

        <div class="candidate-details">

            <p>
                <strong>מדינה:</strong>
                <span id="modalState"></span>
            </p>

            <p>
                <strong>גיל:</strong>
                <span id="modalAge"></span>
            </p>

            <p>
                <strong>תפקיד נוכחי:</strong>
                <span id="modalRole"></span>
            </p>

            <p>
                <strong>תיאור:</strong>
            </p>

            <p id="modalDescription"></p>

            <h3>עמדות מרכזיות</h3>

            <ul id="modalPositions"></ul>

        </div>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
