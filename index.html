<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בחירות מקדימות - מועמדים</title>

    <link rel="stylesheet" href="css/stlye.css">
</head>
<body>

<header>
    <h1>המועמדים לבחירות המקדימות</h1>

    <input
        type="text"
        id="searchBox"
        placeholder="חפש מועמד..."
    >
</header>

<main>
    <div id="candidateGrid" class="candidate-grid"></div>
</main>

<!-- Modal -->

<div id="candidateModal" class="modal hidden">

    <div class="modal-content">

        <button id="closeModal" class="close-btn">
            ✕
        </button>

        <h2 id="modalName"></h2>

        <div class="candidate-details">

            <section>
                <h3>ערכים מובילים</h3>
                <p id="modalValues"></p>
            </section>

            <section>
                <h3>מה אומר שיעשה חבר כנסת</h3>
                <p id="modalPromises"></p>
            </section>

            <section>
                <h3>הישגים ונקודות גאווה</h3>
                <p id="modalAchievements"></p>
            </section>

            <section>
                <h3>ביקורת ודעת האופוזיציה</h3>
                <p id="modalCriticism"></p>
            </section>

            <section>
                <h3>אקטיבי ברשת</h3>
                <p id="modalSocial"></p>
            </section>

            <section>
                <h3>ערוץ 14</h3>
                <p id="modalChannel"></p>
            </section>

        </div>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
