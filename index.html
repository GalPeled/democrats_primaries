<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בחירות מקדימות - מועמדים</title>

    <link rel="stylesheet" href="css/stlye.css">
</head>
<body>
<header>
    <h1>המועמדים לבחירות המקדימות</h1>

    <input
        type="text"
        id="searchBox"
        placeholder="חפש מועמד..."
    >
    <div id="stats"></div>
<select id="filterStatus">

    <option value="all">
        כל המועמדים
    </option>

    <option value="like">
        👍 תומך
    </option>

    <option value="maybe">
        🤔 לא החלטתי
    </option>

    <option value="dislike">
        👎 נפסל
    </option>

</select>
</header>

<main>
    <div id="candidateGrid" class="candidate-grid"></div>
</main>

<!-- Modal -->

<div id="candidateModal" class="modal hidden">

    <div class="modal-content">

        <button id="closeModal" class="close-btn">
            ✕
        </button>

        <h2 id="modalName"></h2>

        <div class="candidate-details">

            <section class="accordion-section">
                <h3 class="accordion-title">ערכים מובילים
                    <span>▼</span>
                </h3>
                <p id="modalValues" class="accordion-content"></p>
            </section>

            <section class="accordion-section">
                <h3 class="accordion-title" >מה אומר שיעשה חבר כנסת
                    <span>▼</span>
                </h3>
                <p id="modalPromises" class="accordion-content"></p>
            </section>

            <section class="accordion-section">
                <h3 class="accordion-title">הישגים ונקודות גאווה
                    <span>▼</span>
                </h3>
                <p id="modalAchievements" class="accordion-content"></p>
            </section>

            <section class="accordion-section">
                <h3 class="accordion-title">ביקורת ודעת האופוזיציה
                    <span>▼</span>
                </h3>
                <p id="modalCriticism" class="accordion-content"></p>
            </section>

            <section class="accordion-section">
                <h3 class="accordion-title">מכונת הרעל
                    <span>▼</span>
                </h3>
                <p id="modalChannel" class="accordion-content"></p>
            </section>

        </div>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
